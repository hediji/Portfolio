<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>لوحة تحكم نخيل — تحليل المبيعات</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const C = {
  bg: "#FAF7F1", panel: "#FFFFFF", ink: "#241C15", inkDim: "#8C8172",
  line: "#EAE3D6", olive: "#5B7553", amber: "#D98E3B", clay: "#B5533C", navy: "#3B4A5A",
};

const revenueData = [
  { month: "يناير", revenue: 42000 },
  { month: "فبراير", revenue: 38500 },
  { month: "مارس", revenue: 51000 },
  { month: "أبريل", revenue: 47500 },
  { month: "مايو", revenue: 62000 },
  { month: "يونيو", revenue: 58000 },
  { month: "يوليو", revenue: 71500 },
];

const topProducts = [
  { name: "زيت زيتون بكر", sales: 320 },
  { name: "عسل سدر", sales: 275 },
  { name: "تمر صفري", sales: 240 },
  { name: "بخور معطر", sales: 190 },
  { name: "قهوة مختصة", sales: 160 },
];

const channelSplit = [
  { name: "المتجر الإلكتروني", value: 54, color: C.olive },
  { name: "تطبيق الجوال", value: 31, color: C.amber },
  { name: "منصات التواصل", value: 15, color: C.clay },
];

const recentOrders = [
  { id: "#3021", customer: "سارة العتيبي", amount: "412 ر.س", status: "مكتمل" },
  { id: "#3020", customer: "محمد القحطاني", amount: "189 ر.س", status: "قيد الشحن" },
  { id: "#3019", customer: "نورة الدوسري", amount: "760 ر.س", status: "مكتمل" },
  { id: "#3018", customer: "خالد الشمري", amount: "95 ر.س", status: "معلّق" },
  { id: "#3017", customer: "لينا الحربي", amount: "530 ر.س", status: "مكتمل" },
];

const statusColor = { "مكتمل": C.olive, "قيد الشحن": C.amber, "معلّق": C.clay };

function KpiCard({ label, value, delta, positive }) {
  return (
    <div className="rounded-2xl p-5" style={{ background: C.panel, border: `1px solid ${C.line}` }}>
      <p className="text-xs mb-2" style={{ color: C.inkDim }}>{label}</p>
      <p className="text-2xl font-black" style={{ color: C.ink }}>{value}</p>
      <p className="text-xs mt-1 font-bold" style={{ color: positive ? C.olive : C.clay }}>
        {positive ? "▲" : "▼"} {delta}
      </p>
    </div>
  );
}

function BarRow({ label, value, max, color }) {
  const pct = Math.round((value / max) * 100);
  return (
    <div className="mb-3">
      <div className="flex justify-between text-xs mb-1" style={{ color: C.inkDim }}>
        <span>{label}</span><span className="font-bold" style={{ color: C.ink }}>{value}</span>
      </div>
      <div className="h-2.5 rounded-full w-full" style={{ background: C.line }}>
        <div className="h-2.5 rounded-full" style={{ width: `${pct}%`, background: color }} />
      </div>
    </div>
  );
}

function RevenueChart() {
  const max = Math.max(...revenueData.map((d) => d.revenue));
  return (
    <div className="flex items-end gap-3 h-48 px-1">
      {revenueData.map((d) => {
        const h = Math.round((d.revenue / max) * 100);
        return (
          <div key={d.month} className="flex-1 flex flex-col items-center justify-end h-full">
            <div className="w-full rounded-t-lg transition-all" style={{ height: `${h}%`, background: C.olive, minHeight: 6 }} />
            <p className="text-[10px] mt-2" style={{ color: C.inkDim }}>{d.month}</p>
          </div>
        );
      })}
    </div>
  );
}

function DonutChart() {
  let acc = 0;
  const stops = channelSplit.map((c) => {
    const start = acc;
    acc += c.value;
    return `${c.color} ${start}% ${acc}%`;
  }).join(", ");
  return (
    <div className="flex flex-col items-center">
      <div className="w-36 h-36 rounded-full" style={{ background: `conic-gradient(${stops})` }}>
        <div className="w-full h-full flex items-center justify-center">
          <div className="w-20 h-20 rounded-full flex items-center justify-center" style={{ background: C.panel }}>
            <span className="text-xs font-black" style={{ color: C.ink }}>100%</span>
          </div>
        </div>
      </div>
      <div className="flex flex-col gap-1.5 mt-4 w-full">
        {channelSplit.map((c) => (
          <div key={c.name} className="flex items-center justify-between text-xs">
            <div className="flex items-center gap-2">
              <span className="w-2.5 h-2.5 rounded-full" style={{ background: c.color }} />
              <span style={{ color: C.inkDim }}>{c.name}</span>
            </div>
            <span className="font-bold" style={{ color: C.ink }}>{c.value}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function StoreDashboard() {
  const [range, setRange] = useState("7 أشهر");
  return (
    <div dir="rtl" className="min-h-screen w-full flex" style={{ background: C.bg, fontFamily: "'Cairo','Tajawal',sans-serif", color: C.ink }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;900&family=Tajawal:wght@400;500;700&display=swap');`}</style>
      <aside className="hidden md:flex flex-col w-56 p-6 shrink-0" style={{ background: C.panel, borderLeft: `1px solid ${C.line}` }}>
        <div className="mb-8">
          <p className="text-xl font-black" style={{ color: C.olive }}>نخيل</p>
          <p className="text-[11px]" style={{ color: C.inkDim }}>متجر منتجات محلية</p>
        </div>
        <nav className="flex flex-col gap-1 text-sm">
          {["نظرة عامة", "الطلبات", "المنتجات", "العملاء", "التقارير", "الإعدادات"].map((item, i) => (
            <div key={item} className="px-3 py-2 rounded-lg"
              style={{ background: i === 0 ? "#F1EBDD" : "transparent", color: i === 0 ? C.olive : C.inkDim, fontWeight: i === 0 ? 700 : 400 }}>
              {item}
            </div>
          ))}
        </nav>
      </aside>
      <main className="flex-1 p-6 md:p-8 max-w-6xl">
        <div className="flex items-center justify-between mb-6 flex-wrap gap-3">
          <div>
            <h1 className="text-2xl font-black">نظرة عامة على الأداء</h1>
            <p className="text-sm" style={{ color: C.inkDim }}>ملخص المبيعات آخر {range}</p>
          </div>
          <div className="flex gap-2">
            {["7 أشهر", "30 يوم", "سنة"].map((r) => (
              <button key={r} onClick={() => setRange(r)} className="px-3 py-1.5 rounded-full text-xs font-bold"
                style={{ background: range === r ? C.olive : C.panel, color: range === r ? "#fff" : C.inkDim, border: `1px solid ${range === r ? C.olive : C.line}` }}>
                {r}
              </button>
            ))}
          </div>
        </div>
        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
          <KpiCard label="إجمالي الإيرادات" value="371,500 ر.س" delta="12.4%" positive />
          <KpiCard label="عدد الطلبات" value="1,741" delta="8.1%" positive />
          <KpiCard label="متوسط قيمة الطلب" value="213 ر.س" delta="2.3%" positive />
          <KpiCard label="معدل الإرجاع" value="1.8%" delta="0.4%" positive={false} />
        </div>
        <div className="grid md:grid-cols-3 gap-4 mb-6">
          <div className="md:col-span-2 rounded-2xl p-5" style={{ background: C.panel, border: `1px solid ${C.line}` }}>
            <p className="text-sm font-bold mb-4">نمو الإيرادات الشهري</p>
            <RevenueChart />
          </div>
          <div className="rounded-2xl p-5" style={{ background: C.panel, border: `1px solid ${C.line}` }}>
            <p className="text-sm font-bold mb-4">قنوات البيع</p>
            <DonutChart />
          </div>
        </div>
        <div className="grid md:grid-cols-2 gap-4">
          <div className="rounded-2xl p-5" style={{ background: C.panel, border: `1px solid ${C.line}` }}>
            <p className="text-sm font-bold mb-4">المنتجات الأكثر مبيعاً</p>
            {topProducts.map((p) => (
              <BarRow key={p.name} label={p.name} value={p.sales} max={topProducts[0].sales} color={C.amber} />
            ))}
          </div>
          <div className="rounded-2xl p-5" style={{ background: C.panel, border: `1px solid ${C.line}` }}>
            <p className="text-sm font-bold mb-4">أحدث الطلبات</p>
            <div className="flex flex-col gap-2">
              {recentOrders.map((o) => (
                <div key={o.id} className="flex items-center justify-between text-sm py-2" style={{ borderBottom: `1px solid ${C.line}` }}>
                  <div>
                    <p className="font-bold">{o.customer}</p>
                    <p className="text-[11px]" style={{ color: C.inkDim }}>{o.id}</p>
                  </div>
                  <div className="text-left">
                    <p className="font-bold">{o.amount}</p>
                    <span className="text-[10px] font-bold px-2 py-0.5 rounded-full" style={{ background: `${statusColor[o.status]}1A`, color: statusColor[o.status] }}>
                      {o.status}
                    </span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<StoreDashboard />);
</script>
</body>
</html>
